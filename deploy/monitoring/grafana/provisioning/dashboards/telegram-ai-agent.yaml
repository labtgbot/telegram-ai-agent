apiVersion: 1

providers:
  - name: telegram-ai-agent
    orgId: 1
    folder: Telegram AI Agent
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/telegram-ai-agent
      foldersFromFilesStructure: false
