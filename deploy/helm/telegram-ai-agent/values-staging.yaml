# Staging overrides.
#
# Usage:
#   helm upgrade --install telegram-ai-agent deploy/helm/telegram-ai-agent \
#     --namespace tgai-staging --create-namespace \
#     -f deploy/helm/telegram-ai-agent/values.yaml \
#     -f deploy/helm/telegram-ai-agent/values-staging.yaml \
#     --set image.tag=${VERSION}

commonLabels:
  environment: staging

config:
  APP_ENV: staging
  APP_DEBUG: "false"
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  API_V1_PREFIX: /api/v1
  HEALTH_CHECK_TIMEOUT: "2.0"
  TELEGRAM_API_BASE_URL: https://api.telegram.org
  TELEGRAM_SET_COMMANDS_ON_STARTUP: "true"
  COMPOSIO_MODE: real
  COMPOSIO_BASE_URL: https://backend.composio.dev
  PAYMENT_CURRENCY: XTR

clusterIssuer: letsencrypt-staging

backend:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: false
  rollout:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 384Mi

miniApp:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 96Mi

admin:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

backgroundWorkers:
  enabled: true

# Staging exercises the backup pipeline daily so we notice broken jobs before
# they bite production. Retention is shorter and verify only runs monthly.
backup:
  enabled: true
  s3:
    bucket: ""
    region: ""
  retentionDays: 14
  walRetentionDays: 3
  postgres:
    enabled: true
    schedule: "0 3 * * *"
  redis:
    enabled: true
    schedule: "30 3 * * *"
  media:
    enabled: false
  prune:
    enabled: true
    schedule: "0 5 * * *"
  verify:
    enabled: true
    schedule: "0 7 1 * *"

ingress:
  hosts:
    - host: staging-bot.example.com
      paths:
        - path: /api/
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: miniApp
    - host: staging-admin.example.com
      paths:
        - path: /
          pathType: Prefix
          service: admin
  tls:
    enabled: true
