{{- define "telegram-ai-agent.ingressResource" -}}
{{- $ctx := .ctx -}}
{{- $annotations := dict -}}
{{- if $ctx.Values.ingress.tls.enabled -}}
{{- $_ := set $annotations "cert-manager.io/cluster-issuer" $ctx.Values.clusterIssuer -}}
{{- end -}}
{{- $annotations = mergeOverwrite $annotations ($ctx.Values.ingress.annotations | default dict) -}}
{{- $annotations = mergeOverwrite $annotations (.annotations | default dict) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .name }}
  labels:
    {{- include "telegram-ai-agent.labels" $ctx | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ include "telegram-ai-agent.ingressClassName" $ctx }}
  {{- if $ctx.Values.ingress.tls.enabled }}
  tls:
    {{- range .hosts }}
    - hosts:
        - {{ .host | quote }}
      secretName: {{ default (printf "%s-tls" .host) $ctx.Values.ingress.tls.secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "backend" }}
                name: {{ include "telegram-ai-agent.componentName" (dict "ctx" $ctx "name" "backend") }}
                port:
                  number: {{ $ctx.Values.backend.service.port }}
                {{- else if eq .service "miniApp" }}
                name: {{ include "telegram-ai-agent.componentName" (dict "ctx" $ctx "name" "mini-app") }}
                port:
                  number: {{ $ctx.Values.miniApp.service.port }}
                {{- else if eq .service "admin" }}
                name: {{ include "telegram-ai-agent.componentName" (dict "ctx" $ctx "name" "admin") }}
                port:
                  number: {{ $ctx.Values.admin.service.port }}
                {{- else }}
                name: {{ .service }}
                port:
                  number: {{ default 80 .servicePort }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end -}}

{{- if .Values.ingress.enabled }}
{{- $ctx := . }}
{{- $sharedHosts := list }}
{{- range .Values.ingress.hosts }}
{{- if not .annotations }}
{{- $sharedHosts = append $sharedHosts . }}
{{- end }}
{{- end }}
{{- if $sharedHosts }}
{{- include "telegram-ai-agent.ingressResource" (dict "ctx" $ctx "name" (include "telegram-ai-agent.fullname" $ctx) "hosts" $sharedHosts) }}
{{- end }}
{{- range $host := .Values.ingress.hosts }}
{{- with $host.annotations }}
---
{{ include "telegram-ai-agent.ingressResource" (dict "ctx" $ctx "name" (include "telegram-ai-agent.ingressHostName" (dict "ctx" $ctx "host" $host.host)) "hosts" (list $host) "annotations" .) }}
{{- end }}
{{- end }}
{{- end }}
