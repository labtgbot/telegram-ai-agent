{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "telegram-ai-agent.componentLabels" (dict "ctx" . "name" "backend") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
{{- range $k, $v := .Values.secret.defaults }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
