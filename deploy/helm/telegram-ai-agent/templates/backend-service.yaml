{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "telegram-ai-agent.componentName" (dict "ctx" . "name" "backend") }}
  labels:
    {{- include "telegram-ai-agent.componentLabels" (dict "ctx" . "name" "backend") | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "telegram-ai-agent.componentSelectorLabels" (dict "ctx" . "name" "backend") | nindent 4 }}
{{- end }}
