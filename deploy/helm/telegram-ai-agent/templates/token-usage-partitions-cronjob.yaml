{{- if .Values.tokenUsagePartitions.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "telegram-ai-agent.componentName" (dict "ctx" . "name" "token-usage-partitions") }}
  labels:
    {{- include "telegram-ai-agent.componentLabels" (dict "ctx" . "name" "token-usage-partitions") | nindent 4 }}
spec:
  schedule: {{ .Values.tokenUsagePartitions.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.tokenUsagePartitions.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.tokenUsagePartitions.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.tokenUsagePartitions.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.tokenUsagePartitions.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.tokenUsagePartitions.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            {{- include "telegram-ai-agent.componentSelectorLabels" (dict "ctx" . "name" "token-usage-partitions") | nindent 12 }}
        spec:
          serviceAccountName: {{ include "telegram-ai-agent.backend.serviceAccountName" . }}
          {{- include "telegram-ai-agent.imagePullSecrets" . | nindent 10 }}
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: token-usage-partitions
              image: {{ include "telegram-ai-agent.image" (dict "ctx" . "component" "backend") }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - -m
                - app.workers.token_usage_partitions
                - --months-ahead
                - {{ .Values.tokenUsagePartitions.monthsAhead | quote }}
              envFrom:
                - configMapRef:
                    name: {{ include "telegram-ai-agent.componentName" (dict "ctx" . "name" "backend-config") }}
                - secretRef:
                    name: {{ .Values.secret.name }}
              resources:
                {{- toYaml .Values.tokenUsagePartitions.resources | nindent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
