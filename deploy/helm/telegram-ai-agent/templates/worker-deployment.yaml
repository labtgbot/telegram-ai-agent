{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "telegram-ai-agent.componentName" (dict "ctx" . "name" "worker") }}
  labels:
    {{- include "telegram-ai-agent.componentLabels" (dict "ctx" . "name" "worker") | nindent 4 }}
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "telegram-ai-agent.componentSelectorLabels" (dict "ctx" . "name" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telegram-ai-agent.componentSelectorLabels" (dict "ctx" . "name" "worker") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "telegram-ai-agent.backend.serviceAccountName" . }}
      {{- include "telegram-ai-agent.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: {{ include "telegram-ai-agent.image" (dict "ctx" . "component" "worker") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toYaml .Values.worker.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "telegram-ai-agent.componentName" (dict "ctx" . "name" "backend-config") }}
            - secretRef:
                name: {{ .Values.secret.name }}
          env:
            - name: COMPOSIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: COMPOSIO_API_KEY
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
