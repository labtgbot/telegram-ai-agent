{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "telegram-ai-agent.componentName" (dict "ctx" . "name" "admin") }}
  labels:
    {{- include "telegram-ai-agent.componentLabels" (dict "ctx" . "name" "admin") | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicaCount }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "telegram-ai-agent.componentSelectorLabels" (dict "ctx" . "name" "admin") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telegram-ai-agent.componentSelectorLabels" (dict "ctx" . "name" "admin") | nindent 8 }}
    spec:
      {{- include "telegram-ai-agent.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin
          image: {{ include "telegram-ai-agent.image" (dict "ctx" . "component" "admin") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
            - name: API_BASE_URL
              value: {{ include "telegram-ai-agent.admin.apiBaseUrl" . | quote }}
            - name: NEXT_PUBLIC_API_BASE_URL
              value: {{ include "telegram-ai-agent.admin.publicApiBaseUrl" . | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
                optional: true
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
{{- end }}
