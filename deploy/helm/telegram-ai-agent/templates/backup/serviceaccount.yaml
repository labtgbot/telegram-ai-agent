{{- if and .Values.backup.enabled .Values.backup.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "telegram-ai-agent.backup.serviceAccountName" . }}
  labels:
    {{- include "telegram-ai-agent.componentLabels" (dict "ctx" . "name" "backup") | nindent 4 }}
  {{- with .Values.backup.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
