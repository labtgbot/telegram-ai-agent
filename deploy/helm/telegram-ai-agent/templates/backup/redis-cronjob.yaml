{{- if and .Values.backup.enabled .Values.backup.redis.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "telegram-ai-agent.componentName" (dict "ctx" . "name" "backup-redis") }}
  labels:
    {{- include "telegram-ai-agent.componentLabels" (dict "ctx" . "name" "backup") | nindent 4 }}
spec:
  schedule: {{ .Values.backup.redis.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "telegram-ai-agent.componentSelectorLabels" (dict "ctx" . "name" "backup") | nindent 12 }}
            backup.tgai/job: redis-rdb
        spec:
          {{- include "telegram-ai-agent.backup.podSpec" . | nindent 10 }}
          containers:
            - name: redis-backup
              image: {{ include "telegram-ai-agent.backup.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/opt/tgai/backup/redis-backup.sh"]
              envFrom:
                {{- include "telegram-ai-agent.backup.envFrom" . | nindent 16 }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: aws-cache
                  mountPath: /home/nobody/.aws/cli
          volumes:
            - name: tmp
              emptyDir: {}
            - name: aws-cache
              emptyDir: {}
{{- end }}
