{{- if and .Values.backup.enabled .Values.backup.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backup.secret.name }}
  labels:
    {{- include "telegram-ai-agent.componentLabels" (dict "ctx" . "name" "backup") | nindent 4 }}
  annotations:
    # Real deployments inject this via sealed-secrets / external-secrets.
    # When create=true we render a placeholder so `helm template` / smoke
    # installs work, but the placeholder must NEVER reach production.
    "helm.sh/hook": pre-install
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
{{- range $k, $v := .Values.backup.secret.defaults }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
