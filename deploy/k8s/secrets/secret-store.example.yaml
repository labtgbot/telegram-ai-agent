# SecretStore for external-secrets-operator pointing at AWS Secrets Manager.
# Swap the provider block for `gcpsm`, `vault`, etc. as needed.
#
# Prerequisite: an IRSA service account (or workload identity) named
# `external-secrets` in the namespace with permission to GetSecretValue
# on the `tgai/*` namespace.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: tgai-aws
  namespace: tgai-prod
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
