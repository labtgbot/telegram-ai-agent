# Example SealedSecret. Real ciphertext is produced by `kubeseal` — these
# values are obvious placeholders so the file is safe to commit. Drop them
# into a kubeseal run and the controller will decrypt into a regular
# Secret with the same name on apply.
#
# Apply: kubectl apply -f deploy/k8s/secrets/<env>/sealed-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: telegram-ai-agent-backend
  namespace: tgai-prod
spec:
  encryptedData:
    TELEGRAM_BOT_TOKEN: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    TELEGRAM_WEBHOOK_SECRET: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    APP_SECRET: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    ADMIN_JWT_SECRET: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    DATABASE_URL: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    REDIS_URL: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    COMPOSIO_API_KEY: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    GEMINI_API_KEY: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    ANTHROPIC_API_KEY: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    OPENAI_API_KEY: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
    PAYMENT_PROVIDER_TOKEN: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...==
  template:
    metadata:
      name: telegram-ai-agent-backend
      namespace: tgai-prod
      labels:
        app.kubernetes.io/part-of: telegram-ai-agent
    type: Opaque
