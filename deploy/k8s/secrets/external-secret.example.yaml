# ExternalSecret that materialises a regular Kubernetes Secret named
# `telegram-ai-agent-backend` from an upstream AWS Secrets Manager entry
# stored as a JSON document. Adjust `remoteRef.key` and the `property`
# fields to match your real provider layout.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-ai-agent-backend
  namespace: tgai-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tgai-aws
    kind: SecretStore
  target:
    name: telegram-ai-agent-backend
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: telegram-ai-agent
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef: { key: tgai/prod/backend, property: TELEGRAM_BOT_TOKEN }
    - secretKey: TELEGRAM_WEBHOOK_SECRET
      remoteRef: { key: tgai/prod/backend, property: TELEGRAM_WEBHOOK_SECRET }
    - secretKey: APP_SECRET
      remoteRef: { key: tgai/prod/backend, property: APP_SECRET }
    - secretKey: ADMIN_JWT_SECRET
      remoteRef: { key: tgai/prod/backend, property: ADMIN_JWT_SECRET }
    - secretKey: DATABASE_URL
      remoteRef: { key: tgai/prod/backend, property: DATABASE_URL }
    - secretKey: REDIS_URL
      remoteRef: { key: tgai/prod/backend, property: REDIS_URL }
    - secretKey: COMPOSIO_API_KEY
      remoteRef: { key: tgai/prod/backend, property: COMPOSIO_API_KEY }
    - secretKey: GEMINI_API_KEY
      remoteRef: { key: tgai/prod/backend, property: GEMINI_API_KEY }
    - secretKey: ANTHROPIC_API_KEY
      remoteRef: { key: tgai/prod/backend, property: ANTHROPIC_API_KEY }
    - secretKey: OPENAI_API_KEY
      remoteRef: { key: tgai/prod/backend, property: OPENAI_API_KEY }
    - secretKey: PAYMENT_PROVIDER_TOKEN
      remoteRef: { key: tgai/prod/backend, property: PAYMENT_PROVIDER_TOKEN }
