# cert-manager ClusterIssuer for production traffic.
#
# Apply once per cluster, after installing cert-manager:
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     --set installCRDs=true
#   kubectl apply -f deploy/k8s/cert-manager/cluster-issuer-prod.yaml
#
# The Ingress shipped by the chart references this issuer via
# `.Values.clusterIssuer` (default `letsencrypt-prod`).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
