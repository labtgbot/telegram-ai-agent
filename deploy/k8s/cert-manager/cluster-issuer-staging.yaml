# Staging ClusterIssuer — uses the Let's Encrypt staging endpoint so we don't
# burn rate limits on the prod CA while iterating on Ingress wiring. Browsers
# will mark the certificate as untrusted; that is expected.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
