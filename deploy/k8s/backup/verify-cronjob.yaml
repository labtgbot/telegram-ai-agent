apiVersion: batch/v1
kind: CronJob
metadata:
  name: tgai-backup-verify
  namespace: tgai-backup
  labels:
    app.kubernetes.io/part-of: telegram-ai-agent
    app.kubernetes.io/component: backup
    backup.tgai/job: verify
spec:
  # 06:00 UTC on the 1st of January, April, July, October.
  schedule: "0 6 1 1,4,7,10 *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 7200
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        spec:
          serviceAccountName: telegram-ai-agent-backup
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: verify
              image: ghcr.io/labtgbot/telegram-ai-agent/backup:latest
              imagePullPolicy: IfNotPresent
              command: ["/opt/tgai/backup/verify-backup.sh"]
              envFrom:
                - configMapRef:
                    name: telegram-ai-agent-backup-config
                - secretRef:
                    name: telegram-ai-agent-backup
              resources:
                requests:
                  cpu: 250m
                  memory: 384Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: aws-cache
                  mountPath: /home/nobody/.aws/cli
          volumes:
            - name: tmp
              emptyDir: {}
            - name: aws-cache
              emptyDir: {}
