# Example — do NOT commit a populated copy of this file.
#
# In real deployments use sealed-secrets or external-secrets-operator. This
# manifest exists only to document the shape of the Secret the backup
# CronJobs expect.
apiVersion: v1
kind: Secret
metadata:
  name: telegram-ai-agent-backup
  namespace: tgai-backup
  labels:
    app.kubernetes.io/part-of: telegram-ai-agent
    app.kubernetes.io/component: backup
type: Opaque
stringData:
  # Omit AWS_* when using IRSA / workload identity.
  AWS_ACCESS_KEY_ID: REPLACE_ME
  AWS_SECRET_ACCESS_KEY: REPLACE_ME
  PGPASSWORD: REPLACE_ME
  REDIS_PASSWORD: ""
  # Optional Slack-compatible webhook for backup success/failure alerts.
  BACKUP_NOTIFY_WEBHOOK: ""
