name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-docs:
    name: Lint docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify GitHub workflow supply-chain guardrails
        run: python3 scripts/validate_github_workflows.py

      - name: Verify required docs exist
        run: |
          set -e
          for f in README.md CONTRIBUTING.md SECURITY.md \
                   docs/ARCHITECTURE.md docs/ROADMAP.md \
                   docs/TOKEN_ECONOMY.md docs/DATABASE_SCHEMA.md docs/API_REFERENCE.md \
                   docs/ADMIN_CRM_GUIDE.md docs/ADMIN_GUIDE.md docs/USER_GUIDE.md \
                   docs/CHANGELOG.md \
                   docs/SECURITY.md docs/DEPLOYMENT.md \
                   docs/PRICING_STRATEGY.md \
                   docs/security/threat-model.md docs/security/owasp-top10.md \
                   docs/security/pentest-scope.md docs/security/audit-report.md; do
            test -f "$f" || (echo "Missing required doc: $f" && exit 1)
          done
