name: Admin Dashboard

on:
  push:
    branches: [main]
    paths:
      - "admin-dashboard/**"
      - ".github/workflows/admin.yml"
  pull_request:
    paths:
      - "admin-dashboard/**"
      - ".github/workflows/admin.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: admin-dashboard

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Detect package.json
        id: detect
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f admin-dashboard/package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Admin Dashboard::No admin-dashboard/package.json yet — skipping lint/typecheck/build."
          fi

      - name: Set up Node ${{ env.NODE_VERSION }}
        if: steps.detect.outputs.ready == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.ready == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: ESLint
        if: steps.detect.outputs.ready == 'true'
        run: npm run lint --if-present

      - name: Type-check
        if: steps.detect.outputs.ready == 'true'
        run: npm run typecheck --if-present

      - name: Build
        if: steps.detect.outputs.ready == 'true'
        run: npm run build --if-present

      - name: Upload build artifact
        if: steps.detect.outputs.ready == 'true' && hashFiles('admin-dashboard/.next/**', 'admin-dashboard/dist/**', 'admin-dashboard/build/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: admin-dashboard-build
          path: |
            admin-dashboard/.next
            admin-dashboard/dist
            admin-dashboard/build
          if-no-files-found: ignore
