name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/**"
      - "docker/Dockerfile.backend"
      - "docker/compose.yml"
      - ".github/workflows/backend.yml"
      - "Makefile"
  pull_request:
    paths:
      - "backend/**"
      - "scripts/**"
      - "docker/Dockerfile.backend"
      - "docker/compose.yml"
      - ".github/workflows/backend.yml"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: "70"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: backend
        run: ruff check .

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Mypy
        working-directory: backend
        run: mypy app

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: telegram_ai_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d telegram_ai_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/telegram_ai_agent
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply migrations (verify downgrade + upgrade cycle)
        working-directory: backend
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Seed dev data
        run: python -m scripts.seed

      - name: Run pytest with coverage
        working-directory: backend
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=${COVERAGE_THRESHOLD} \
            -v

      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: warn

      - name: Upload coverage HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov
          if-no-files-found: warn

  smoke-health:
    name: Health endpoint smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: telegram_ai_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d telegram_ai_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/telegram_ai_agent
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "."

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start uvicorn
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

      - name: Wait for /health to return 200
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8000/api/v1/health > health.json; then
              cat health.json
              exit 0
            fi
            sleep 1
          done
          echo "----- uvicorn.log -----"
          cat backend/uvicorn.log || true
          exit 1

      - name: Stop uvicorn
        if: always()
        working-directory: backend
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi
