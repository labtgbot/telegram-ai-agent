name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-run nightly so newly published CVEs do not sit unscanned between PRs.
    - cron: "17 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (runtime only) + pip-audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install "pip-audit>=2.7,<3"

      - name: Run pip-audit
        working-directory: backend
        run: |
          pip-audit --strict --progress-spinner off \
            --format json --output ../pip-audit.json
      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: warn

  npm-audit:
    name: npm audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - mini-app
          - admin-dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies (production only)
        working-directory: ${{ matrix.workspace }}
        run: npm ci --omit=dev

      - name: Run npm audit
        working-directory: ${{ matrix.workspace }}
        # `--audit-level=high` makes the job fail only for High/Critical
        # CVEs; lower findings remain visible in the JSON artifact but
        # don't block PRs while we triage them.
        run: |
          set -o pipefail
          npm audit --omit=dev --audit-level=high \
            --json | tee ../npm-audit-${{ matrix.workspace }}.json

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.workspace }}
          path: npm-audit-${{ matrix.workspace }}.json
          if-no-files-found: warn

  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install "bandit[sarif]>=1.7,<2"

      - name: Run Bandit
        # Skip tests (B101 = assert_used is fine in tests) and the auto-
        # generated alembic versions tree.
        run: |
          bandit -r backend/app \
            --severity-level medium \
            --confidence-level medium \
            -f sarif -o bandit.sarif

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Upload Bandit SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit.sarif
          if-no-files-found: warn

  semgrep:
    name: Semgrep (cross-language SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/dockerfile \
            --sarif --output semgrep.sarif \
            --exclude="**/node_modules" \
            --exclude="**/.next" \
            --exclude="**/dist" \
            --exclude="**/build" \
            --exclude="backend/alembic/versions" \
            --error
        env:
          # No Semgrep App token: we run the open-source rulesets only and
          # the job is allowed to fail when rules flag a real issue.
          SEMGREP_SEND_METRICS: "off"

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn

  gitleaks:
    name: Gitleaks (secrets scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the scanner sees the entire repository, not
          # just the latest commit.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Redact actual secret values from logs/artifacts so a leak does
          # not turn into a second leak via CI output.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: "1"

      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy fs SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          if-no-files-found: warn

  trivy-image-backend:
    name: Trivy image scan (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (prod target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          target: prod
          load: true
          push: false
          tags: tgai-backend:security-scan
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: tgai-backend:security-scan
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image-backend.sarif
          exit-code: "1"

      - name: Upload Trivy backend SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-backend.sarif
          category: trivy-image-backend

      - name: Upload Trivy backend SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-backend-sarif
          path: trivy-image-backend.sarif
          if-no-files-found: warn
