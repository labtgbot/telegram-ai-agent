name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-run nightly so newly published CVEs do not sit unscanned between PRs.
    - cron: "17 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  # Defaults applied to every job. Individual scanners that upload SARIF
  # need `security-events: write`; `actions: read` lets the CodeQL action
  # call `GET /repos/.../actions/runs/.../artifacts`; `pull-requests: read`
  # lets gitleaks-action fetch the PR commit list when running on PR
  # events.
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (runtime only) + pip-audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install "pip-audit>=2.7,<3"

      - name: Run pip-audit
        working-directory: backend
        # `pip-audit` cannot resolve the locally-installed editable
        # package (`telegram-ai-agent-backend`) on PyPI and aborts even
        # with `--skip-editable` on pip-audit 2.10. We sidestep that by
        # feeding it the list of resolved third-party deps directly via
        # `pip freeze --exclude-editable`.
        run: |
          pip freeze --exclude-editable > /tmp/resolved-requirements.txt
          pip-audit --strict --progress-spinner off \
            --requirement /tmp/resolved-requirements.txt \
            --format json --output ../pip-audit.json
      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: warn

  npm-audit:
    name: npm audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - mini-app
          - admin-dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies (production only)
        working-directory: ${{ matrix.workspace }}
        run: npm ci --omit=dev

      - name: Run npm audit
        working-directory: ${{ matrix.workspace }}
        # `--audit-level=critical` makes the job fail only on Critical
        # CVEs. High/Medium/Low findings remain visible in the uploaded
        # JSON artifact and are tracked manually in
        # `docs/security/audit-report.md` (see F-006 for the open Next.js
        # advisories scheduled for Phase 4.x). Raising the gate back to
        # `high` blocks the next release once the upgrade lands.
        run: |
          set -o pipefail
          npm audit --omit=dev --audit-level=critical \
            --json | tee ../npm-audit-${{ matrix.workspace }}.json

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.workspace }}
          path: npm-audit-${{ matrix.workspace }}.json
          if-no-files-found: warn

  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install "bandit[sarif]>=1.7,<2"

      - name: Run Bandit
        # Skip tests (B101 = assert_used is fine in tests) and the auto-
        # generated alembic versions tree.
        run: |
          bandit -r backend/app \
            --severity-level medium \
            --confidence-level medium \
            -f sarif -o bandit.sarif

      - name: Upload Bandit SARIF
        if: always()
        # GitHub Code Scanning is only enabled on repos with GHAS. When it
        # is off, this step 403s with "Resource not accessible by
        # integration" — we tolerate that here because the SARIF file is
        # still preserved via `actions/upload-artifact` below.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Upload Bandit SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit.sarif
          if-no-files-found: warn

  semgrep:
    name: Semgrep (cross-language SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v6

      - name: Mark workspace as safe for git
        # The semgrep container runs as root, while the checkout step
        # creates files under the runner user. Without this, semgrep's
        # internal `git ls-files` aborts with "dubious ownership".
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run Semgrep
        # We run the open-source rulesets only (no Semgrep App token),
        # so we use `semgrep scan` rather than `semgrep ci`. `--error`
        # forces a non-zero exit when any rule fires.
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/dockerfile \
            --sarif --output semgrep.sarif \
            --exclude="**/node_modules" \
            --exclude="**/.next" \
            --exclude="**/dist" \
            --exclude="**/build" \
            --exclude="backend/alembic/versions" \
            --error
        env:
          SEMGREP_SEND_METRICS: "off"

      - name: Upload Semgrep SARIF
        if: always()
        # See "Upload Bandit SARIF" — tolerate Code-Scanning-disabled
        # repos; the artifact upload below keeps the SARIF reachable.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn

  gitleaks:
    name: Gitleaks (secrets scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the scanner sees the entire repository, not
          # just the latest commit.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Redact actual secret values from logs/artifacts so a leak does
          # not turn into a second leak via CI output.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          # `exit-code: 1` keeps the CI gate strict — any NEW HIGH/CRITICAL
          # that lands outside the documented exceptions (see
          # `.trivyignore` and audit-report.md § F-006/F-007) blocks merge.
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Upload Trivy fs SARIF
        if: always()
        # See "Upload Bandit SARIF" — tolerate Code-Scanning-disabled
        # repos; the artifact upload below keeps the SARIF reachable.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy fs SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          if-no-files-found: warn

  trivy-image-backend:
    name: Trivy image scan (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (prod target)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.backend
          target: prod
          load: true
          push: false
          tags: tgai-backend:security-scan
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tgai-backend:security-scan
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image-backend.sarif
          # Same gate rationale as the fs scan above: documented
          # exceptions live in `.trivyignore` (see audit-report.md
          # § F-008); new HIGH/CRITICAL findings still fail CI.
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Upload Trivy backend SARIF
        if: always()
        # See "Upload Bandit SARIF" — tolerate Code-Scanning-disabled
        # repos; the artifact upload below keeps the SARIF reachable.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-backend.sarif
          category: trivy-image-backend

      - name: Upload Trivy backend SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-backend-sarif
          path: trivy-image-backend.sarif
          if-no-files-found: warn
