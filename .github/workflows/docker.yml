name: Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "backend/**"
      - "mini-app/**"
      - "admin-dashboard/**"
      - "docker/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "docker/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & push (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            dockerfile: docker/Dockerfile.backend
            context: .
            target: prod
          - name: mini-app
            dockerfile: docker/Dockerfile.mini-app
            context: mini-app
            target: ""
          - name: admin
            dockerfile: docker/Dockerfile.admin
            context: admin-dashboard
            target: ""
    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile is present
        id: check
        run: |
          if [ -f "${{ matrix.image.dockerfile }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Docker::${{ matrix.image.dockerfile }} not found — skipping ${{ matrix.image.name }} image build."
          fi

      - name: Set up QEMU
        if: steps.check.outputs.ready == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.check.outputs.ready == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        if: steps.check.outputs.ready == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build${{ github.event_name != 'pull_request' && ' & push' || '' }} image
        if: steps.check.outputs.ready == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          platforms: linux/amd64
