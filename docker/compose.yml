# Local development stack.
#
# Запуск:   docker compose -f docker/compose.yml up -d
# Логи:     docker compose -f docker/compose.yml logs -f
# Stop:     docker compose -f docker/compose.yml down
# Reset:    docker compose -f docker/compose.yml down -v
#
# Backend образ собирается из docker/Dockerfile.backend (target=dev) и слушает на
# http://localhost:8000. Сервис ожидает готовности postgres и redis через
# healthcheck, миграции запускаются вручную (см. ниже).
#
# Применить миграции (после поднятия стека):
#   docker compose -f docker/compose.yml exec backend alembic upgrade head

services:
  postgres:
    image: postgres:15-alpine
    container_name: tgai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_ai_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_ai_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tgai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: dev
    container_name: tgai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      LOG_LEVEL: INFO
      LOG_FORMAT: console
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/telegram_ai_agent
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/live').status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
