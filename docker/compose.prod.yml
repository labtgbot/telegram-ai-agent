# Production-like docker compose stack.
#
# Designed for single-host deployments / staging shells where Kubernetes is
# overkill. The Helm chart in deploy/helm/telegram-ai-agent is the supported
# production target — this file is a fallback. Compared to compose.yml it:
#
#   * pulls pre-built images from GHCR instead of building from source
#   * runs uvicorn with multiple workers, no --reload, no source mount
#   * resolves env from .env.prod (kept out of git)
#   * adds Caddy in front for TLS termination + reverse proxy
#
# Usage:
#   cp .env.example .env.prod && $EDITOR .env.prod
#   docker compose -f docker/compose.prod.yml --env-file .env.prod pull
#   docker compose -f docker/compose.prod.yml --env-file .env.prod up -d
#   docker compose -f docker/compose.prod.yml exec backend alembic upgrade head

x-backend-worker-base: &backend-worker-base
  image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set to an immutable release tag or digest}
  restart: unless-stopped
  user: "1000:1000"
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  env_file:
    - ../.env.prod
  environment:
    APP_ENV: production
    APP_DEBUG: "false"
    LOG_LEVEL: INFO
    LOG_FORMAT: json
    DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/telegram_ai_agent
    REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.prod}@redis:6379/0
    COMPOSIO_MODE: real
    COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:?COMPOSIO_API_KEY must be set in .env.prod}
  tmpfs:
    - /tmp:uid=1000,gid=1000,mode=1777
  deploy:
    resources:
      limits:
        cpus: "0.75"
        memory: 512M

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: tgai-caddy
    restart: unless-stopped
    user: "65534:65534"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-bot.example.com}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-ops@example.com}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_DIR:?CADDY_DATA_DIR must point to a writable directory owned by UID 65534}:/data
      - ${CADDY_CONFIG_DIR:?CADDY_CONFIG_DIR must point to a writable directory owned by UID 65534}:/config
    tmpfs:
      - /tmp:exec,uid=65534,gid=65534,mode=1777
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cp /usr/bin/caddy /tmp/caddy
        chmod 0555 /tmp/caddy
        exec /tmp/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    healthcheck:
      test: ["CMD", "/tmp/caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set to an immutable release tag or digest}
    container_name: tgai-backend
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env.prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/telegram_ai_agent
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.prod}@redis:6379/0
      COMPOSIO_MODE: real
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:?COMPOSIO_API_KEY must be set in .env.prod}
    tmpfs:
      - /tmp:uid=1000,gid=1000,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/live').status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1G
    command:
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=8000
      - --workers=4
      - --no-access-log

  broadcast-worker:
    <<: *backend-worker-base
    container_name: tgai-broadcast-worker
    command:
      - python
      - -m
      - app.workers.broadcast
      - --loop

  video-polling-worker:
    <<: *backend-worker-base
    container_name: tgai-video-polling-worker
    command:
      - python
      - -m
      - app.workers.video_polling
      - --loop
      - --interval-s
      - "10"

  subscriptions-worker:
    <<: *backend-worker-base
    container_name: tgai-subscriptions-worker
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          python -m app.workers.subscriptions
          sleep "$${SUBSCRIPTION_RENEWAL_INTERVAL_SECONDS:-86400}"
        done

  account-deletion-worker:
    <<: *backend-worker-base
    container_name: tgai-account-deletion-worker
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          python -m app.workers.account_deletion
          sleep "$${ACCOUNT_DELETION_INTERVAL_SECONDS:-86400}"
        done

  admin-refresh-sessions-worker:
    <<: *backend-worker-base
    container_name: tgai-admin-refresh-sessions-worker
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          python -m app.workers.admin_refresh_sessions
          sleep "$${ADMIN_REFRESH_SESSIONS_CLEANUP_INTERVAL_SECONDS:-86400}"
        done

  daily-analytics-worker:
    <<: *backend-worker-base
    container_name: tgai-daily-analytics-worker
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          python -m app.workers.daily_analytics
          sleep "$${DAILY_ANALYTICS_INTERVAL_SECONDS:-86400}"
        done

  token-usage-partitions-worker:
    <<: *backend-worker-base
    container_name: tgai-token-usage-partitions-worker
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          python -m app.workers.token_usage_partitions --months-ahead "$${TOKEN_USAGE_PARTITIONS_MONTHS_AHEAD:-6}"
          sleep "$${TOKEN_USAGE_PARTITIONS_INTERVAL_SECONDS:-86400}"
        done

  mini-app:
    image: ${MINI_APP_IMAGE:?MINI_APP_IMAGE must be set to an immutable release tag or digest}
    container_name: tgai-mini-app
    restart: unless-stopped
    user: "101:101"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:uid=101,gid=101,mode=1777
      - /var/cache/nginx:uid=101,gid=101,mode=755
      - /run:uid=101,gid=101,mode=755
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M

  admin:
    image: ${ADMIN_IMAGE:?ADMIN_IMAGE must be set to an immutable release tag or digest}
    container_name: tgai-admin
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env.prod
    environment:
      PORT: "3001"
      NODE_ENV: production
      API_BASE_URL: ${API_BASE_URL:?API_BASE_URL must be set in .env.prod}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL must be set in .env.prod}
    tmpfs:
      - /tmp:uid=1000,gid=1000,mode=1777
      - /app/.next/cache:uid=1000,gid=1000,mode=755
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3001/',res=>process.exit(res.statusCode && res.statusCode < 500 ? 0 : 1));req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>req.destroy());"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  postgres:
    image: postgres:15-alpine
    container_name: tgai-postgres
    restart: unless-stopped
    user: "70:70"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.prod}
      POSTGRES_DB: telegram_ai_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    tmpfs:
      - /tmp:uid=70,gid=70,mode=1777
      - /run/postgresql:uid=70,gid=70,mode=775
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_ai_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: tgai-redis
    restart: unless-stopped
    user: "999:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.prod}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.prod}
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp:uid=999,gid=1000,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

volumes:
  postgres_data:
  redis_data:
